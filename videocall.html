<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call | EDU SWAP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 150px);
            background: #2c3e50;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin: 20px auto;
            max-width: 1200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: #1a252f;
            transform: scaleX(-1); /* Mirror local video */
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .control-btn {
            background: #fff;
            color: #333;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .control-btn.off {
            background: #e74c3c;
            color: white;
        }

        .control-btn#hangupBtn {
            background: #e74c3c;
            color: white;
        }
        
        .control-btn#hangupBtn:hover {
            background: #c0392b;
        }

        #callStatus {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">EDU SWAP Video Call</div>
        <div class="nav-links">
            <button id="backBtn" class="btn btn-secondary btn-sm">Back to Chat</button>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 100%; margin: 0; padding: 0 20px;">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            
            <div id="callStatus">Initializing...</div>

            <div class="controls">
                <button class="control-btn" id="audioBtn" title="Mute/Unmute Audio">🎤</button>
                <button class="control-btn" id="videoBtn" title="Turn Video On/Off">📷</button>
                <button class="control-btn" id="callBtn" title="Start Call">📞</button>
                <button class="control-btn" id="hangupBtn" title="Hang Up">🛑</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/videocall.js"></script>
</body>
</html>
