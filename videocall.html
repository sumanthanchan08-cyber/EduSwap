<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call | EDU SWAP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">EDU SWAP Video Call</div>
        <div class="nav-links">
            <button id="backBtn" class="btn btn-secondary btn-sm">Back to Chat</button>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 100%; margin: 0; padding: 0 20px;">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            
            <div id="callStatus">Initializing...</div>

            <div class="controls">
                <button class="control-btn" id="audioBtn" title="Mute/Unmute Audio">🎤</button>
                <button class="control-btn" id="videoBtn" title="Turn Video On/Off">📷</button>
                <button class="control-btn" id="callBtn" title="Start Call">📞</button>
                <button class="control-btn" id="hangupBtn" title="Hang Up">🛑</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/videocall.js"></script>
</body>
</html>
