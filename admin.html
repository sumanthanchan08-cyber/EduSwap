<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – EduSwap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Admin Page Layout */
    .admin-body {
      display: block;
      padding: 0;
      background: var(--bg-primary);
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 30px;
    }

    .admin-header {
      margin-bottom: 50px;
      text-align: left;
    }

    .admin-header h1 {
      font-size: 2.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .admin-header p {
      margin-bottom: 0;
      color: var(--text-secondary);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--glass-border);
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .stat-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
    }

    .stat-card h3 {
      color: var(--text-secondary);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .stat-card p {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    /* Admin Sections */
    .admin-section {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid var(--glass-border);
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .admin-section h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 12px;
      font-weight: 700;
    }

    /* User Table */
    .user-table {
      width: 100%;
      border-collapse: collapse;
    }

    .user-table thead {
      background: rgba(255, 255, 255, 0.02);
    }

    .user-table th {
      text-align: left;
      padding: 12px 16px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--glass-border);
    }

    .user-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .user-table tbody tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-badge.admin {
      background: rgba(168, 85, 247, 0.2);
      color: #d8b4fe;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    .role-badge.user {
      background: rgba(6, 182, 212, 0.2);
      color: #67e8f9;
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    /* Action Buttons */
    .action-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
      padding: 6px 12px;
      margin: 0 4px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .action-btn.add {
      color: #10b981;
    }

    .action-btn.subtract {
      color: #f87171;
    }

    .action-btn.delete {
      color: #f87171;
    }

    /* Activity Feed */
    .activity-feed {
      max-height: 400px;
      overflow-y: auto;
    }

    .activity-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 3px solid var(--accent-primary);
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .activity-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    /* Navbar Override for Admin */
    .navbar .nav-item {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .navbar .nav-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text-primary);
    }

    .navbar .nav-item.active {
      color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.15);
    }

    .navbar #toggle-admin {
      margin-left: auto;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.2);
      color: #d8b4fe;
      width: auto;
      box-shadow: none;
    }

    .navbar #toggle-admin:hover {
      background: rgba(168, 85, 247, 0.2);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header h1 {
        font-size: 2rem;
      }

      .admin-container {
        padding: 20px 15px;
      }

      .user-table {
        font-size: 0.85rem;
      }

      .user-table th,
      .user-table td {
        padding: 12px 8px;
      }

      .navbar {
        flex-direction: column;
        gap: 10px;
        padding: 15px 20px;
      }

      .navbar #toggle-admin {
        margin-left: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body class="admin-body">
  <!-- Navbar -->
  <nav class="navbar glass">
    <a href="/" class="nav-brand">EDUSWAP</a>
    <div style="display: flex; gap: 10px; align-items: center; flex: 1;">
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="admin.html" class="nav-item active">Admin Panel</a>
    </div>
    <button id="toggle-admin" class="nav-item btn btn-sm">Toggle Admin</button>
  </nav>

  <div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <p>Manage users, sessions, and platform activity</p>
    </div>

    <!-- Overview Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <p id="total-users">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Sessions</h3>
        <p id="total-sessions">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Requests</h3>
        <p id="total-requests">0</p>
      </div>
    </div>

    <!-- User Management -->
    <section class="admin-section">
      <h2>User Management</h2>
      <div style="overflow-x: auto;">
        <table class="user-table" id="user-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Credits</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Activity Monitor -->
    <section class="admin-section">
      <h2>Activity Monitor</h2>
      <div class="activity-feed" id="activity-feed"></div>
    </section>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
