<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session | EDU SWAP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">EDU SWAP Chat</div>
        <div class="nav-links">
            <a href="sessions.html" class="btn btn-secondary btn-sm">Back to Sessions</a>
        </div>
    </nav>

    <div class="dashboard-container" style="padding: 0 10px;">
        <div class="chat-container">
            <div class="chat-header">
                <h2 id="chatTitle">Loading Chat...</h2>
                <button id="startVideoBtn" class="btn btn-sm">Start Video Call</button>
            </div>
            
            <div class="chat-messages" id="messagesBox">
                <!-- Messages go here -->
            </div>

            <form class="chat-input-area" id="chatForm">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
