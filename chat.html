<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session | EDU SWAP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 70vh;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px;
            background: #667eea;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { font-size: 1.2rem; }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f9fbfd;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .message.received {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
            display: block;
        }
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #667eea;
        }
        .chat-input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .chat-input-area button:hover {
            background: #5a6fd6;
        }
    </style>
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">EDU SWAP Chat</div>
        <div class="nav-links">
            <a href="sessions.html" class="btn btn-secondary btn-sm" style="border:none">Back to Sessions</a>
        </div>
    </nav>

    <div class="dashboard-container" style="padding: 0 10px;">
        <div class="chat-container">
            <div class="chat-header">
                <h2 id="chatTitle">Loading Chat...</h2>
                <button id="startVideoBtn" class="btn btn-sm" style="background: white; color: #667eea;">Start Video Call</button>
            </div>
            
            <div class="chat-messages" id="messagesBox">
                <!-- Messages go here -->
            </div>

            <form class="chat-input-area" id="chatForm">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
