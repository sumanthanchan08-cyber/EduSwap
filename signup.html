<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | My App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p>Join us today to get started.</p>
        
        <form id="signupForm">
            <div class="form-group" id="nameGroup">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
                <div class="error-message">Name is required.</div>
            </div>

            <div class="form-group" id="emailGroup">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
                <div class="error-message">Please enter a valid email address.</div>
            </div>
            
            <div class="form-group" id="passwordGroup">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password (min 6 chars)">
                <div class="error-message">Password must be at least 6 characters long.</div>
            </div>
            
            <button type="submit" class="btn">Sign Up</button>
        </form>

        <div class="divider">or</div>

        <button type="button" class="btn btn-google google-login-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Sign Up with Google
        </button>
        
        <div class="links">
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
